[Rule]

# 广告拦截 (Loyalsoldier 维护，去 App 开屏及网页广告)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/reject.txt,拒绝
# 隐私追踪拦截 (防止 App 后台上传个人数据)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Privacy.yaml,拒绝

# === 个人置顶规则 ===
RULE-SET,https://raw.githubusercontent.com/songxiaohuo/clash-rules/main/list/song_color0.list,SEX
RULE-SET,https://raw.githubusercontent.com/songxiaohuo/clash-rules/main/list/song_cn0.list,国内
RULE-SET,https://raw.githubusercontent.com/songxiaohuo/clash-rules/main/list/song_global0.list,国外
DOMAIN-SUFFIX,giffgaff.com,🇬🇧 GiffGaff-英国优选
DOMAIN-KEYWORD,giffgaff,🇬🇧 GiffGaff-英国优选


# OpenAI (ChatGPT / Dall-E)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/openai.txt,AI
# Claude (Anthropic)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Claude.yaml,AI
# GitHub (代码仓库、Actions)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/github.txt,国外

# YouTube (包含视频流和 API)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/youtube.txt,YouTube
# Netflix (自制剧及版权内容)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/netflix.txt,Netflix
# TikTok (短视频)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/tiktok.txt,TikTok
# Spotify (音乐流媒体)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/spotify.txt,流媒体

# Telegram (电报群组、消息)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/telegram.txt,国外
# Google (搜索、地图等基础服务)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/google.txt,Google

# 苹果服务 (iCloud, App Store, 系统更新)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/apple.txt,Apple
# 国内常用域名 (直连，不走代理)
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/cn.txt,国内
# 局域网/内网地址
RULE-SET,https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/applications.txt,直连
# 中国 IP 段 (GeoIP 强力兜底)
GEOIP,CN,国内
# 最终兜底规则
FINAL,其他


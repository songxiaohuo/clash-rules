name: Sync All Rules
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Batch Download
        run: |
          mkdir -p list
          # 1. 同步 .list 文件 (来自 blackmatrix7 库)
          RULES=(
            "Instagram" "Facebook" "Twitter" "Reddit" "Pinterest" 
            "Twitch" "Advertising" "Privacy" "Hijacking" "Global" 
            "Steam" "Epic" "EA" "Blizzard" "UBI" "Sony" "Nintendo" 
            "Docker" "Claude" "MetaAi" "Telegram"
          )
          
          for rule in "${RULES[@]}"; do
            echo "正在同步: $rule"
            # 使用 -f 参数，如果 404 会报错而不是下载错误页面
            curl -fL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/$rule/$rule.list" -o "list/$rule.list" || echo "跳过无效规则: $rule"
          done

          # 2. 同步 .mrs 文件 (修正 metacubex 路径)
          echo "正在同步 MRS 文件..."
          
          # 基础服务类 (在 geosite 目录下)
          MRS_SITES=("openai" "github" "telegram" "perplexity")
          for site in "${MRS_SITES[@]}"; do
            curl -fL "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/$site.mrs" -o "list/$site.mrs" || echo "下载失败: $site"
          done

          # 流媒体类 (注意：MetaCube 仓库中这些文件可能在 geosite 目录下，但由于上游更新，建议强制拉取全小写名)
          STREAMING=("youtube" "spotify" "appletv" "hbo" "disney" "primevideo" "paramount" "hulu")
          for media in "${STREAMING[@]}"; do
            echo "正在同步流媒体 MRS: $media"
            # 确保使用全小写路径
            curl -fL "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/$media.mrs" -o "list/$media.mrs" || \
            curl -fL "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/streaming.mrs" -o "list/$media.mrs" # 兜底逻辑
          done

          for site in "${MRS_SITES[@]}"; do
            echo "正在同步 MRS: $site"
            curl -L "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/$site.mrs" -o "list/$site.mrs"
          done

      - name: Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Automated update including streaming services" || exit 0
          git push

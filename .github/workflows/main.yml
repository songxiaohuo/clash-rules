name: Sync All Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Batch Download and Convert
        run: |
          mkdir -p list

          # === 1. blackmatrix7 公共规则（含 TikTok）===
          RULES=(
            "Instagram" "Facebook" "Twitter" "Reddit" "Pinterest"
            "Twitch" "Advertising" "Privacy" "Hijacking" "Global"
            "Steam" "Epic" "EA" "Blizzard" "UBI" "Sony" "Nintendo"
            "Docker" "Claude" "MetaAi" "Telegram" "TikTok"
          )

          for rule in "${RULES[@]}"; do
            echo "正在同步并转换: $rule"

            curl -fL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/$rule/$rule.list" \
              -o "list/${rule}_raw.list" || echo "Skip $rule"

            if [ -f "list/${rule}_raw.list" ]; then
              sed -E '
                s/#.*//;
                s/^[[:space:]]*-[[:space:]]*//;
                s/^[[:space:]]+//;
                s/[[:space:]]+$//;
                /^$/d
              ' "list/${rule}_raw.list" > "list/${rule}_sr.list"

              rm -f "list/${rule}_raw.list"
            fi
          done

          # === 2. MetaCubeX (mrs + 文本规则转 Shadowrocket) ===
          MRS_SITES=(
            "openai" "github" "telegram" "perplexity"
            "youtube" "spotify" "hbo" "disney" "primevideo" "hulu"
            "apple" "appletv" "netflix"
          )

          for site in "${MRS_SITES[@]}"; do
            echo "正在同步 MRS 和文本规则: $site"

            # 下载 mrs（二进制）
            curl -fL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/$site.mrs" \
              -o "list/$site.mrs" || echo "Fail $site mrs"

            # 下载文本规则
            curl -fL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/$site.list" \
              -o "list/${site}_raw.list" || echo "Fail $site list"

            # 转换为 Shadowrocket 格式
            if [ -f "list/${site}_raw.list" ]; then
              sed -E '
                s/#.*//;
                s/^[[:space:]]*-[[:space:]]*//;
                s/^domain:/DOMAIN,/;
                s/^domain-suffix:/DOMAIN-SUFFIX,/;
                s/^full:/DOMAIN,/;
                s/^keyword:/DOMAIN-KEYWORD,/;
                s/^regexp:/URL-REGEX,/;
                s/^[[:space:]]+//;
                s/[[:space:]]+$//;
                /^$/d
              ' "list/${site}_raw.list" > "list/${site}_sr.list"

              rm -f "list/${site}_raw.list"
            fi
          done

      - name: Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-sync: Update sr rules (TikTok + MRS fixed)" || exit 0
          git push

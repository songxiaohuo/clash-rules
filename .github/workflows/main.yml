name: Sync All Rules
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Batch Download
        run: |
          mkdir -p list
          # 1. 同步 .list 文本文件 (保持不变)
          RULES=(
            "Instagram" "Facebook" "Twitter" "Reddit" "Pinterest" 
            "Twitch" "Advertising" "Privacy" "Hijacking" "Global" 
            "Steam" "Epic" "EA" "Blizzard" "UBI" "Sony" "Nintendo" 
            "Docker" "Claude" "MetaAi" "Telegram"
          )
          for rule in "${RULES[@]}"; do
            curl -fL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/$rule/$rule.list" -o "list/$rule.list" || echo "Skip $rule"
          done

          # 2. 同步基础服务 MRS (保持不变)
          MRS_SITES=("openai" "github" "telegram" "perplexity")
          for site in "${MRS_SITES[@]}"; do
            curl -fL "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/$site.mrs" -o "list/$site.mrs" || echo "Fail $site"
          done

          # 3. 彻底修复流媒体 (改用 Loyalsoldier 的稳定源)
          echo "正在从稳定源同步流媒体..."
          # 注意：这里改用 Loyalsoldier 的资源，路径更可靠
          MEDIA_LIST=("youtube" "spotify" "appletv" "hbo" "disney" "primevideo" "paramount" "hulu")
          for media in "${MEDIA_LIST[@]}"; do
            echo "同步 $media..."
            # 尝试从新源下载，如果失败则尝试 metacubex 的全局 streaming
            curl -fL "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/$media.txt" -o "list/$media.list" || \
            curl -fL "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/streaming.mrs" -o "list/$media.mrs"
          done

      - name: Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Final Fix: Switch to stable source for streaming rules" || exit 0
          git push

name: Sync All Rules
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Batch Download
        run: |
          mkdir -p list
          # 1. 基础 List 规则 (来自 blackmatrix7)
          RULES=("Instagram" "Facebook" "Twitter" "Reddit" "Pinterest" "Twitch" "Advertising" "Privacy" "Hijacking" "Global" "Steam" "Epic" "EA" "Blizzard" "UBI" "Sony" "Nintendo" "Docker" "Claude" "MetaAi" "Telegram")
          for rule in "${RULES[@]}"; do
            curl -fL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/$rule/$rule.list" -o "list/$rule.list" || echo "Skip $rule"
          done

          # 2. 基础 MRS 规则 (保留 metacubex 的这几个，它们没失效)
          MRS_SITES=("openai" "github" "telegram" "perplexity")
          for site in "${MRS_SITES[@]}"; do
            curl -fL "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/$site.mrs" -o "list/$site.mrs" || echo "Fail $site"
          done

          # 3. 流媒体规则 (全部改用 Loyalsoldier 稳定源，后缀统一为 .list)
          MEDIA=("youtube" "spotify" "appletv" "hbo" "disney" "primevideo" "paramount" "hulu")
          for m in "${MEDIA[@]}"; do
            echo "正在同步流媒体: $m"
            curl -fL "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/$m.txt" -o "list/$m.list" || echo "Media $m Download Failed"
          done

      - name: Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "One-time fix: Use stable source for all streaming rules" || exit 0
          git push

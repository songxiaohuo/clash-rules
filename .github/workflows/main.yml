name: Sync All Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ 提前适配 Node 24

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 后续可升级 v5

      - name: Batch Download
        run: |
          mkdir -p list

          echo "===== 同步 .list 规则 ====="

          RULES=(
            "Instagram" "Facebook" "Twitter" "Reddit" "Pinterest"
            "Twitch" "Advertising" "Privacy" "Hijacking" "Global"
            "Steam" "Epic" "EA" "Blizzard" "UBI" "Sony" "Nintendo"
            "Docker" "Claude" "MetaAi" "Telegram"
          )

          for rule in "${RULES[@]}"; do
            echo "同步: $rule"
            curl -f -L \
              "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/$rule/$rule.list" \
              -o "list/$rule.list" \
              || echo "❌ $rule 下载失败"
          done


          echo "===== 同步 .mrs 规则 ====="

          MRS_SITES=(
            "openai"
            "github"
            "telegram"
            "perplexity"
            "youtube"
            "spotify"
            "netflix"
            "disney"
            "primevideo"
            "hbo"
            "hulu"
            "apple"          # ✅ 替代 appletv
            "streaming"      # ✅ 替代 paramount
          )

          for site in "${MRS_SITES[@]}"; do
            echo "同步 MRS: $site"
            curl -f -L \
              "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/$site.mrs" \
              -o "list/$site.mrs" \
              || echo "⚠️ $site 不存在，已跳过"
          done

      - name: Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Automated update (fixed missing mrs rules)" || exit 0
          git push

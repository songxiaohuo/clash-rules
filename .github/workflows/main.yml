name: Sync All Rules
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Batch Download
        run: |
          mkdir -p list
          # 1. 同步 .list 文件 (来自 blackmatrix7 库)
          RULES=(
            "Instagram" "Facebook" "Twitter" "Reddit" "Pinterest" 
            "Twitch" "Advertising" "Privacy" "Hijacking" "Global" 
            "Steam" "Epic" "EA" "Blizzard" "UBI" "Sony" "Nintendo" 
            "Docker" "Claude" "MetaAi" "Telegram"
          )
          
          for rule in "${RULES[@]}"; do
            echo "正在同步: $rule"
            curl -fL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/$rule/$rule.list" -o "list/$rule.list" || echo "Skip $rule"
          done

          # 2. 同步 .mrs 文件 (已剔除 appletv 和 paramount)
          echo "正在同步 MRS 文件..."
          MRS_SITES=(
            "openai" "github" "telegram" "perplexity" 
            "youtube" "spotify" "hbo" "disney" "primevideo" "hulu"
          )

          for site in "${MRS_SITES[@]}"; do
            echo "正在同步 MRS: $site"
            curl -fL "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/$site.mrs" -o "list/$site.mrs" || echo "Fail $site"
          done

      - name: Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Clean up rules and fix script syntax" || exit 0
          git push

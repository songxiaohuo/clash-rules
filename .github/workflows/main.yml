name: Sync All Rules
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Batch Download
        run: |
          mkdir -p list
          # 1. 批量下载 .list 规则 (来自 blackmatrix7)
          RULES=(
            "Instagram" "Facebook" "Twitter" "Reddit" "Pinterest" 
            "Twitch" "Advertising" "Privacy" "Hijacking" "Global" 
            "Steam" "Epic" "EA" "Blizzard" "UBI" "Sony" "Nintendo" "Docker"
          )
          
          for rule in "${RULES[@]}"; do
            echo "正在同步: $rule"
            curl -L "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/$rule/$rule.list" -o "list/$rule.list"
          done

          # 2. 单独下载 .mrs 规则 (来自 metacubex)
          echo "正在同步 MRS 文件..."
          curl -L "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/openai.mrs" -o "list/openai.mrs"
          curl -L "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/github.mrs" -o "list/github.mrs"
          curl -L "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/telegram.mrs" -o "list/telegram.mrs"

      - name: Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Automated update for all rules" || exit 0
          git push
